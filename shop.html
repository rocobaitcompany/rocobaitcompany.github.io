<!DOCTYPE html>
<html>
<head>
  <title>Shop - RoCo Bait Company</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: black;
      color: white;
      text-align: center;
    }

    /* VIDEO BACKGROUND */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0.6;
      filter: brightness(0.6);
      z-index: -1;
    }

    h1 {
      padding: 20px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      padding: 40px;
    }

    /* PRODUCT CARD */
    .card {
      background-color: #111;
      width: 250px;
      border-radius: 10px;
      padding: 15px;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      color: white;
      display: inline-block;
    }

    .card:hover {
      transform: translateY(-5px);
      background-color: #222;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card h3 {
      margin: 10px 0 5px 0;
    }

    .card p {
      margin: 0;
      color: #ccc;
    }

    /* BACK LINK */
    .back {
      color: white;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- BACKGROUND VIDEO -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="background.mp4" type="video/mp4">
  </video>

  <h1>Shop</h1>

  <a class="back" href="index.html">← Back Home</a>

  <div class="grid">

    <a href="paddletails.html" class="card">
      <img src="paddletail.png" alt="Paddle Tail">
      <h3>Paddle Tail Swimbait</h3>
      <p>$6.99</p>
    </a>

    <a href="2inchpaddletails.html" class="card">
      <img src="2inchpaddletail.png" alt="2 inch Paddle Tail">
      <h3>2" Paddle Tails</h3>
      <p>$5.99</p>
    </a>

    <a href="stickbait.html" class="card">
      <img src="stickbait.png" alt="Stickbait">
      <h3>Stickbait</h3>
      <p>$5.99</p>
    </a>

    <a href="flukes.html" class="card">
      <img src="flukes.png" alt="Flukes">
      <h3>Flukes</h3>
      <p>$6.49</p>
    </a>

    <a href="grubs.html" class="card">
      <img src="grubs.png" alt="Curly Tail Grubs">
      <h3>Curly Tail Grubs</h3>
      <p>$5.49</p>
    </a>

  </div>

</body>
</html>
